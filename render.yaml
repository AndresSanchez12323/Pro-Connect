services:
  - type: web
    name: proconnect-backend
    runtime: node
    rootDir: .
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm run build:backend
    startCommand: corepack enable && pnpm -C pro-connect/backend run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL
        value: "true"
      - key: DB_SYNCHRONIZE
        value: "true"
      - key: DB_LOGGING
        value: "false"
