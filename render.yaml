services:
  - type: web
    name: proconnect-backend
    runtime: node
    rootDir: pro-connect/backend
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL
        value: "true"
      - key: DB_SYNCHRONIZE
        value: "true"
      - key: DB_LOGGING
        value: "false"
